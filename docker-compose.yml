# AiMANAC Personal Backend — Customer Deploy
#
# 1. Copy .env.example to .env and fill in your values
#    (or run: ./generate-env.sh to auto-generate secrets)
# 2. docker compose up -d
# 3. Visit http://localhost:3000 in your browser — you'll see the setup code
# 4. Open AiMANAC on your phone → Personal Backend → enter your server URL + code

services:
  aimanac:
    image: ghcr.io/everplay-tech/aimanac-server:latest
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/aimanac
      - REDIS_URL=redis://redis:6379
      - RUST_LOG=info
      - SCHEDULER_AUTO_START=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - aimanac_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=aimanac
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aimanac"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/var/lib/redis/data
    restart: unless-stopped

volumes:
  aimanac_data:
  postgres_data:
  redis_data:
